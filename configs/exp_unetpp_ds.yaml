# ============================================================
# Experiment: UNet++ with Deep Supervision — Phase 1 Strong CNN Baseline
# ============================================================
# Architecture: 4-level UNet++ with dense nested skip connections
#   AND deep supervision on 3 output nodes (x0,3 x0,2 x0,1)
#   Channels: 32 → 64 → 128 → 256 (bottleneck)
#   Dense connections enable multi-scale feature reuse
#   Deep supervision: direct gradient to each intermediate node
#
# Why 200 epochs:
#   Dense connections + deep supervision require more gradient steps
#   to converge. UNetPP_DS has significantly more paths than UNet3D.
#
# Deep supervision weights: [1.0, 0.5, 0.25]
#   main output (x0,3): weight 1.0
#   aux  output (x0,2): weight 0.5
#   aux  output (x0,1): weight 0.25
#
# Data pipeline: v1 (augmentation + percentile clip + TC-biased sampling)
# Trainer:       segmentation_v2 (deep supervision aware)
# Evaluator:     evaluation_v1   (75% overlap + CC filter)
# ============================================================

name: unetpp_ds
seed: 42
use_gpu: true

versions:
  data: v1
  trainer: segmentation_v2
  evaluation: v1

data:
  train_root: data/raw/brats-gli/training/training_data1_v2
  val_ratio: 0.2
  patch_size: [128, 128, 128]
  tumor_ratio: 0.8
  num_workers: 4
  max_samples: null

model:
  type: unetpp_ds
  in_channels: 4               # T1c, T1n, T2f, T2w
  out_channels: 4              # BG, TC, ED, ET
  base_channels: 32            # → [32, 64, 128, 256]

training:
  epochs: 200                  # extra epochs for dense connection convergence
  batch_size: 1
  lr: 0.0001
  lr_min: 1.0e-6
  mixed_precision: true
  warmup_epochs: 10            # longer warmup for complex dense architecture
  grad_clip: 1.0
  ds_weights: [1.0, 0.5, 0.25]  # [main, aux1, aux2] deep supervision weights

optimizer:
  type: adam
  weight_decay: 1.0e-4

loss:
  type: weighted_dice_focal_ce
  class_weights: [0.1, 3.0, 1.0, 2.0]
  focal_weight: 0.5

evaluation:
  overlap: 0.75
  cc_filter: true
  cc_min_size: 50
