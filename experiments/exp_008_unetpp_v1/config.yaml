# ============================================================
# Experiment: UNet++ — Pipeline v1 (Improved Training)
# ============================================================
# Changes vs v0:
#   - WeightedDice + WeightedCE + FocalLoss
#   - tumor_ratio 0.5 → 0.8
#   - epochs 100 → 200 (UNet++ needs more epochs due to complexity)
#   - CosineAnnealingLR (lr_min=1e-6)
#   - Note: deep supervision is a Phase 2 item; this run establishes
#           a fair v1 baseline for UNet++ under the same loss regime
# ============================================================

name: unetpp_v1

seed: 42
use_gpu: true

# ------ VERSION ROUTING ------
versions:
  data: v0
  trainer: segmentation_v1
  evaluation: v0

# ------ DATA ------
data:
  train_root: data/raw/brats-gli/training/training_data1_v2
  val_ratio: 0.2

  patch_size: [128, 128, 128]
  tumor_ratio: 0.8

  num_workers: 4
  max_samples: null

# ------ MODEL ------
model:
  type: unetpp
  in_channels: 4
  out_channels: 4
  base_channels: 32

# ------ TRAINING ------
training:
  epochs: 200           # longer than UNet/AttUNet — UNet++ needs it
  batch_size: 1
  lr: 0.0001
  lr_min: 1.0e-6
  mixed_precision: true

optimizer:
  type: adam

# ------ LOSS ------
loss:
  type: weighted_dice_focal_ce
  class_weights: [0.1, 3.0, 1.0, 2.0]
  focal_weight: 0.5
