name: attention_unet

seed: 42
use_gpu: true

data:
  train_root: data/raw/brats-gli/training/training_data1_v2
  val_ratio: 0.2

  patch_size: [64, 64, 64]
  tumor_ratio: 0.5

  num_workers: 4

model:
  type: attention_unet
  in_channels: 4
  out_channels: 4
  base_channels: 32

training:
  epochs: 40
  batch_size: 1
  lr: 0.0001
  mixed_precision: true

optimizer:
  type: adam

loss:
  type: dice_ce